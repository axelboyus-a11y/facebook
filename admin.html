<!doctype html>
<html lang="bn">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#07111f"/>
<title>RTN Admin Lite V8 SuperFast Cloudinary</title>
<style>
:root{--bg:#07111f;--card:#0f172a;--card2:#111c31;--text:#e5e7eb;--muted:#94a3b8;--line:#1e293b;--brand:#0866ff;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--shadow:0 18px 50px rgba(0,0,0,.35)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:radial-gradient(circle at 20% 0,#172554,transparent 35%),var(--bg);font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text)}button,input{font:inherit}button{cursor:pointer}.hidden{display:none!important}.muted{color:var(--muted)}.tiny{font-size:12px}.grow{flex:1}.row{display:flex;gap:10px;align-items:center}.wrap{flex-wrap:wrap}.card{background:rgba(15,23,42,.95);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}.btn{border:0;border-radius:13px;padding:10px 14px;background:var(--brand);color:white;font-weight:850}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.amber{background:var(--amber)}.btn.ghost{background:var(--card2);color:var(--text);border:1px solid var(--line)}.btn.full{width:100%}.login{min-height:100vh;display:grid;place-items:center;padding:18px}.box{width:min(430px,100%);padding:22px}.brand{font-size:30px;font-weight:950}input{width:100%;border:1px solid var(--line);background:#0b1220;color:var(--text);border-radius:14px;padding:13px;margin:12px 0}.top{position:sticky;top:0;z-index:30;background:rgba(7,17,31,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.topin{max-width:1180px;margin:auto;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}.layout{max-width:1180px;margin:auto;padding:16px;display:grid;grid-template-columns:260px 1fr;gap:16px}.side{padding:14px;height:calc(100vh - 82px);position:sticky;top:72px}.menu{width:100%;border:0;background:transparent;color:var(--text);text-align:left;padding:13px;border-radius:15px;font-weight:850;margin-bottom:5px}.menu:hover,.menu.active{background:#172554;color:#bfdbfe}.panel{padding:16px;min-height:70vh}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:#0b1220;border:1px solid var(--line);border-radius:20px;padding:16px}.stat b{font-size:30px}.item{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--line)}.avatar{width:46px;height:46px;border-radius:50%;object-fit:cover}.badge{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:50%;background:var(--brand);color:white;font-size:12px}.toast{position:fixed;right:16px;bottom:16px;background:#020617;color:white;padding:12px 14px;border-radius:15px;display:none;max-width:92vw}.toast.show{display:block}.danger{background:rgba(239,68,68,.10);border:1px solid rgba(239,68,68,.35);padding:12px;border-radius:16px}@media(max-width:760px){.layout{grid-template-columns:1fr;padding:10px 10px 84px}.side{position:static;height:auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}.menu{margin:0}.grid{grid-template-columns:1fr 1fr}.item{align-items:flex-start;flex-wrap:wrap}.brand{font-size:23px}.topin{align-items:flex-start}.btn{padding:9px 11px}}

:root{--soft:rgba(8,102,255,.10)}.stat{transition:.18s}.stat:hover{transform:translateY(-2px);border-color:#2563eb}.item{border-radius:16px;margin:6px 0;background:rgba(15,23,42,.35)}.menu{transition:.15s}.panel h2{margin-top:0}.danger{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);padding:12px;border-radius:16px}.success{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);padding:12px;border-radius:16px}
</style>
</head>
<body>
<div id="login" class="login"><div class="card box"><div class="brand">RTN Admin</div><p class="muted">Admin password diye login korun.</p><input id="pass" type="password" autocomplete="current-password" placeholder="Admin password"><button id="loginBtn" class="btn full">Login</button><p class="tiny muted">Password: **fuck**</p><div id="loginStatus" class="tiny muted"></div></div></div>
<div id="app" class="hidden"><header class="top"><div class="topin"><div><div class="brand">RTN Admin Lite V8</div><div class="tiny muted" id="who"></div></div><button class="btn ghost" id="logoutBtn">Logout</button></div></header><main class="layout"><aside class="card side"><button class="menu active" data-v="dash">📊 Dashboard</button><button class="menu" data-v="users">👥 Users</button><button class="menu" data-v="blue">✅ Blue Badge</button><button class="menu" data-v="posts">📝 Posts</button><button class="menu" data-v="stories">⭕ Stories</button><button class="menu" data-v="expired">🧹 Expired Stories</button><button class="menu" data-v="notes">💬 Notes</button><button class="menu" data-v="reports">🚩 Reports</button><button class="menu" data-v="blocks">⛔ Blocks</button><button class="menu" data-v="settings">⚙️ Settings</button></aside><section id="content" class="card panel"></section></main></div><div id="toast" class="toast"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const firebaseConfig={"apiKey":"AIzaSyA04x1Iqxah2dxqMoR_OS1ZNIpzcUVzivE","authDomain":"rtn-chat-final.firebaseapp.com","projectId":"rtn-chat-final","storageBucket":"rtn-chat-final.firebasestorage.app","messagingSenderId":"611169479435","appId":"1:611169479435:web:3ce902d7a2a44055be100e","measurementId":"G-HERPT7Q6BX"};
const app=initializeApp(firebaseConfig), auth=getAuth(app), db=getFirestore(app);
const ADMIN_EMAIL="rtnadmin2026@rtnchat.app";
const ADMIN_AUTH_PASSWORD="RTN_Admin_2026";
const UI_PASSWORD="2026";
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
function toast(t){$("#toast").textContent=t;$("#toast").classList.add("show");setTimeout(()=>$("#toast").classList.remove("show"),2600)}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function avatar(n){return `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(n||"RTN")}`}
async function ensureAdmin(){const u=auth.currentUser;if(!u)return false;await setDoc(doc(db,"admins",u.uid),{email:ADMIN_EMAIL,role:"admin",updatedAt:new Date().toISOString()},{merge:true});return true}
async function adminLogin(){const pass=$("#pass").value.trim();if(pass!==UI_PASSWORD){toast("Wrong password. **fuck** dao");return}$("#loginStatus").textContent="Logging in...";try{try{await signInWithEmailAndPassword(auth,ADMIN_EMAIL,ADMIN_AUTH_PASSWORD)}catch(e){if(String(e.code||e.message).includes("user-not-found")||String(e.code||e.message).includes("auth/invalid-credential")){await createUserWithEmailAndPassword(auth,ADMIN_EMAIL,ADMIN_AUTH_PASSWORD)}else throw e}await ensureAdmin();showApp();toast("Admin login success")}catch(e){$("#loginStatus").textContent="Login error: "+e.message;toast("Firebase Auth/Rules check koro")}}
function showApp(){localStorage.rtnAdmin="1";$("#login").classList.add("hidden");$("#app").classList.remove("hidden");$("#who").textContent=auth.currentUser?`Signed in: ${auth.currentUser.email}`:"Signed in";openPanel("dash")}
$("#loginBtn").onclick=adminLogin;$("#pass").addEventListener("keydown",e=>{if(e.key==="Enter")adminLogin()});$("#logoutBtn").onclick=async()=>{localStorage.removeItem("rtnAdmin");await signOut(auth);location.reload()};
onAuthStateChanged(auth,async u=>{if(u&&localStorage.rtnAdmin==="1"){try{await ensureAdmin();showApp()}catch(e){toast("Admin permission pending. Rules deploy koro.")}}});
$$('.menu').forEach(b=>b.onclick=()=>openPanel(b.dataset.v));

function stampMs(v){if(!v)return 0;if(typeof v.toMillis==="function")return v.toMillis();if(typeof v.seconds==="number")return v.seconds*1000;const t=new Date(v).getTime();return Number.isFinite(t)?t:0}
function storyExpiryMs(x){const e=stampMs(x.expiresAt);if(e)return e;const c=stampMs(x.createdAt);return c?c+12*60*60*1000:0}
function leftText(x){const left=storyExpiryMs(x)-Date.now();if(left<=0)return "expired";const h=Math.floor(left/3600000),m=Math.floor((left%3600000)/60000);return h>0?`${h}h ${m}m left`:`${m}m left`}

async function all(c,ordered=false){try{const q=ordered?query(collection(db,c),orderBy("createdAt","desc"),limit(100)):collection(db,c);const s=await getDocs(q);return s.docs.map(d=>({id:d.id,...d.data()}))}catch(e){toast(`${c} load error: ${e.message}`);return []}}
function setActive(v){$$('.menu').forEach(b=>b.classList.toggle('active',b.dataset.v===v))}
async function openPanel(v){setActive(v);$("#content").innerHTML="<p class='muted'>Loading...</p>";if(v==="dash")return dash();if(v==="users")return users();if(v==="blue")return blue();if(v==="posts")return posts();if(v==="stories")return stories();if(v==="expired")return expiredStories();if(v==="notes")return notes();if(v==="reports")return reports();if(v==="blocks")return blocks();if(v==="settings")return settings()}
async function dash(){const [u,p,s,b,n,r]=await Promise.all([all("users"),all("posts"),all("stories"),all("blue_requests"),all("notes"),all("reports")]);$("#content").innerHTML=`<h2>Dashboard</h2><div class="grid"><div class="stat">Users<br><b>${u.length}</b></div><div class="stat">Posts<br><b>${p.length}</b></div><div class="stat">Stories<br><b>${s.length}</b></div><div class="stat">Reports<br><b>${r.filter(x=>x.status!=="reviewed").length}</b></div></div><p class="muted">V8 Admin: faster dashboard, blue badge reason, reports, blocks, expired story cleanup.</p>`}
async function users(){const u=await all("users");$("#content").innerHTML=`<h2>Users</h2>${u.map(x=>`<div class="item"><img class="avatar" src="${x.avatar||avatar(x.fullName)}"><div class="grow"><b>${esc(x.fullName||x.username)} ${x.verified?'<span class="badge">✓</span>':''}</b><div class="muted">@${esc(x.username||"")} ${x.banned?" · Banned":""}</div></div><button class="btn green" onclick="verify('${x.id}',true)">Verify</button><button class="btn ghost" onclick="verify('${x.id}',false)">Unverify</button><button class="btn red" onclick="ban('${x.id}',${!x.banned})">${x.banned?'Unban':'Ban'}</button></div>`).join("")||"<p>No users</p>"}`}
window.verify=async(id,v)=>{await setDoc(doc(db,"users",id),{verified:v},{merge:true});toast("Updated");users()};
window.ban=async(id,v)=>{await setDoc(doc(db,"users",id),{banned:v},{merge:true});toast("Updated");users()};
async function blue(){const r=await all("blue_requests");$("#content").innerHTML=`<h2>Blue Badge Requests</h2>${r.map(x=>`<div class="item"><div class="grow"><b>${esc(x.name||x.username)}</b><div class="muted">@${esc(x.username)} · ${esc(x.status||"pending")}</div><p>${esc(x.reason||"No reason provided")}</p></div><button class="btn green" onclick="approve('${x.id}','${x.uid}')">Approve</button><button class="btn red" onclick="reject('${x.id}','${x.uid}')">Reject</button></div>`).join("")||"<p>No request</p>"}`}
window.cleanupExpired=async()=>{if(!confirm("Delete all expired stories?"))return;const s=(await all("stories",true)).filter(x=>storyExpiryMs(x)<=Date.now());for(const x of s){await deleteDoc(doc(db,"stories",x.id))}toast("Expired stories deleted");expiredStories()};

async function notes(){const n=await all("notes",true);$("#content").innerHTML=`<h2>Notes</h2>${n.map(x=>`<div class="item"><div class="grow"><b>${esc(x.text||"Note")}</b><div class="muted">uid: ${esc(x.uid||"")}</div></div><button class="btn red" onclick="del('notes','${x.id}','notes')">Delete</button></div>`).join("")||"<p>No notes</p>"}`}
window.del=async(c,id,v)=>{if(!confirm("Delete this item?"))return;await deleteDoc(doc(db,c,id));toast("Deleted");openPanel(v)};

async function reports(){const r=await all("reports",true);$("#content").innerHTML=`<h2>Reports</h2>${r.map(x=>`<div class="item"><div class="grow"><b>${esc(x.type||"report")} · ${esc(x.status||"pending")}</b><div class="muted">From: ${esc(x.from||"")} · Target: ${esc(x.targetUid||x.postId||"")}</div><p>${esc(x.reason||"")}</p></div><button class="btn green" onclick="markReport('${x.id}')">Reviewed</button><button class="btn red" onclick="del('reports','${x.id}','reports')">Delete</button></div>`).join("")||"<p>No reports</p>"}`}
window.markReport=async id=>{await setDoc(doc(db,"reports",id),{status:"reviewed",reviewedAt:new Date().toISOString()},{merge:true});toast("Reviewed");reports()};
async function blocks(){const b=await all("blocks",true);$("#content").innerHTML=`<h2>Blocks</h2>${b.map(x=>`<div class="item"><div class="grow"><b>${esc(x.blocker||"")} blocked ${esc(x.blocked||"")}</b><div class="muted">${esc((x.users||[]).join(" / "))}</div></div><button class="btn red" onclick="del('blocks','${x.id}','blocks')">Remove</button></div>`).join("")||"<p>No blocks</p>"}`}

function settings(){$("#content").innerHTML=`<h2>Settings</h2><div class="danger"><b>Important</b><p class="muted">Static HTML admin password real security na. Final security Firestore rules + Cloudinary preset limits e ache. V8 app Cloudinary upload and notification sound use kore. Production launch er jonno backend/custom claims best.</p></div><p>Password input: <b>2026</b></p><button class="btn" onclick="openPanel('dash')">Back Dashboard</button>`}
</script>
</body>
</html>
